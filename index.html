<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./general.css">
  <link rel="stylesheet" href="./index.css">
  <title>Keke Nape</title>
</head>
<body>
  <header class="flex justify-between full-width">
    <div id="logo" class="by-3">
     <span><img src="./icons/Vector.png" alt="logo"></span> 
      WinGame</div>
    <ul class="flex row by-2 justify-between align-center">
      <li>How to Play</li>
      <li>Prizes</li>
      <li>Winners</li>
      <li><button class="header-btn" id="sign-up">  <img src="icons/signup.png" alt="signup">Sign Up</button></li>
      <li><button class="header-btn" id="login"> <img src="icons/login.png" alt="login">Login</button></li>
    </ul>
  </header>
  <main class="full-width flex">
    <section class="by-2 flex column justify-between">
      <img src="./icons/dollars.png" alt="dollars" height="25rem" width="25rem" class="dollars ">
      <div class="heading">
      <h1>Buy a Ticket</h1>
      <h2>Play the Game. <br/> <div class="win-big">WIN BIG!</div></h2> </div>
      <p>Log in, buy a ticket, and play to stand <br/>a chance to win amazing prices like <br/> cash and Keke Napep</p>
      <button class="ticket">Buy a Ticket</button>
    </section>
    <section class="by-2" id="section-2">
      <img src="./keke-napep.png" alt="keke-napep-img">
    </section>
  </main>
  <footer>
    <ul class="flex  justify-between by-3 align-center ">
      <li>Log In</li>
      <img src="./icons/arrow.png" alt="arrow">
      <li>Buy Ticket</li>
      <img src="./icons/arrow.png" alt="arrow">
      <div class="flex align-center gap">
      <img src="./icons/champion.png" alt="champion" width="30rem" height="30rem">
      <li>Play & Win</li> </div>
    </ul>
  </footer>
</body>
</html>
